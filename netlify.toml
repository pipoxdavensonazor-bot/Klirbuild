[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_APP_URL = "https://www.klirline.app"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"

[[headers]]
  for = "/api/health"
  [headers.values]
    Cache-Control = "no-store"

[dev]
  command = "npm run dev"
  targetPort = 3000

# Cron quotidien — automations (factures en retard, leads, etc.)
# Définir CRON_SECRET sur Netlify ; appeler avec Authorization: Bearer <secret>
[[scheduled.functions]]
  path = "/api/cron/automations"
  schedule = "0 13 * * *"
