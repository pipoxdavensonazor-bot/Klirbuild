[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_APP_URL = "https://klirline.app"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # camera + microphone needed for Loom Record SDK (tutoriels Centre d'aide)
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=(self)"

[[headers]]
  for = "/api/health"
  [headers.values]
    Cache-Control = "no-store"

[dev]
  command = "npm run dev"
  targetPort = 3000

# Crons Netlify — définir CRON_SECRET ; Authorization: Bearer <secret> requis en prod
# Automations (factures en retard, leads, etc.) — 09:00 America/Toronto ≈ 13:00 UTC
[[scheduled.functions]]
  path = "/api/cron/automations"
  schedule = "0 13 * * *"

# Factures récurrentes — toutes les heures
[[scheduled.functions]]
  path = "/api/cron/recurring-invoices"
  schedule = "15 * * * *"
