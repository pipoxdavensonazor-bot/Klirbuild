name: Native apps (Windows EXE + Android APK)

on:
  workflow_dispatch:
  push:
    paths:
      - "apps/desktop/**"
      - "apps/android/**"
      - ".github/workflows/native-apps.yml"

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/android/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install & sync Capacitor
        working-directory: apps/android
        run: |
          npm ci
          npx cap sync android

      - name: Decode release keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: apps/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KLIRBUILD_KEYSTORE_PASSWORD: ${{ secrets.KLIRBUILD_KEYSTORE_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > klirbuild-release.keystore
          cat > android/keystore.properties <<EOF
          storeFile=../../klirbuild-release.keystore
          storePassword=${KLIRBUILD_KEYSTORE_PASSWORD}
          keyAlias=klirbuild
          keyPassword=${KLIRBUILD_KEYSTORE_PASSWORD}
          EOF

      - name: Build APK / AAB
        working-directory: apps/android/android
        env:
          KLIRBUILD_KEYSTORE_PASSWORD: ${{ secrets.KLIRBUILD_KEYSTORE_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease bundleRelease

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: klirbuild-android
          path: |
            apps/android/android/app/build/outputs/apk/debug/*.apk
            apps/android/android/app/build/outputs/apk/release/*.apk
            apps/android/android/app/build/outputs/bundle/release/*.aab

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop deps
        working-directory: apps/desktop
        run: npm ci

      - name: Build Tauri Windows
        working-directory: apps/desktop
        run: npm run build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: klirbuild-windows
          path: |
            apps/desktop/src-tauri/target/release/klirbuild.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
